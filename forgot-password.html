<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Восстановление пароля - Телемедицина</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            padding: 30px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input, button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
        }

        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }

        .success {
            background: #d4edda;
            color: #155724;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
        }

        .link {
            text-align: center;
            margin-top: 15px;
        }

        a {
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Восстановление пароля</h2>
        <p>Введите ваш email, мы отправим ссылку для сброса пароля</p>
        <input type="email" id="email" placeholder="Email">
        <button id="sendBtn">Отправить</button>
        <div id="message"></div>
        <div class="link"><a href="login.html">Вернуться ко входу</a></div>
    </div>
    <script>
        const API_URL = ``;

        document.getElementById('sendBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const msgDiv = document.getElementById('message');

            if (!email) {
                msgDiv.innerHTML = '<div class="error">Введите email</div>';
                return;
            }

            msgDiv.innerHTML = '<div>Отправка...</div>';

            try {
                const response = await fetch(`${API_URL}/api/Auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const result = await response.json();
                msgDiv.innerHTML = `<div class="success">${result.message}</div>`;
                document.getElementById('email').value = '';
            } catch (error) {
                msgDiv.innerHTML = '<div class="error">Ошибка подключения к серверу</div>';
            }
        };
    </script>
</body>
</html>
