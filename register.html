<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Телемедицина</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 500px;
            padding: 30px;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

            button:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            }

        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }

        .error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }

        .success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }

        .info {
            background: #e3f2fd;
            color: #1976d2;
            border: 1px solid #bbdef5;
        }

        .link {
            text-align: center;
            margin-top: 15px;
        }

            .link a {
                color: #667eea;
                text-decoration: none;
            }

        .row {
            display: flex;
            gap: 10px;
        }

            .row .form-group {
                flex: 1;
            }

        .debug {
            background: #333;
            color: #0f0;
            padding: 10px;
            margin-top: 10px;
            font-family: monospace;
            font-size: 10px;
            word-break: break-all;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Регистрация пациента</h2>
        <form id="registerForm">
            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="email" required>
            </div>

            <div class="form-group">
                <label>Пароль *</label>
                <input type="password" id="password" required>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Фамилия *</label>
                    <input type="text" id="surname" required>
                </div>
                <div class="form-group">
                    <label>Имя *</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label>Отчество</label>
                    <input type="text" id="middlename">
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Дата рождения *</label>
                    <input type="date" id="dateOfBirth" required>
                </div>
                <div class="form-group">
                    <label>Пол *</label>
                    <select id="gender" required>
                        <option value="">Выберите</option>
                        <option value="Male">Мужской</option>
                        <option value="Female">Женский</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Контактные данные</label>
                <input type="text" id="contactInfo" placeholder="Телефон или email">
            </div>

            <div class="form-group">
                <label>Номер полиса ОМС/ДМС</label>
                <input type="text" id="insurancePolicyNumber">
            </div>

            <button type="submit">Зарегистрироваться</button>
        </form>

        <div id="message" class="message" style="display: none;"></div>
        <div id="debugInfo" class="debug"></div>

        <div class="link">
            <a href="login.html">Уже есть аккаунт? Войти</a>
        </div>
    </div>

    <script>
        const API_URL = 'https://localhost:7189';

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Получаем дату в правильном формате YYYY-MM-DD
            const dateOfBirth = document.getElementById('dateOfBirth').value;

            const data = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                surname: document.getElementById('surname').value,
                name: document.getElementById('name').value,
                middleName: document.getElementById('middlename').value || "",
                dateOfBirth: dateOfBirth,  // Уже в формате YYYY-MM-DD
                gender: document.getElementById('gender').value,
                contactInfo: document.getElementById('contactInfo').value || "",
                insurancePolicyNumber: document.getElementById('insurancePolicyNumber').value || ""
            };

            const messageDiv = document.getElementById('message');
            const debugDiv = document.getElementById('debugInfo');

            messageDiv.style.display = 'block';
            messageDiv.className = 'message info';
            messageDiv.textContent = 'Отправка данных...';

            // Отладка: показываем что отправляем
            debugDiv.style.display = 'block';
            debugDiv.innerHTML = '📤 Отправка JSON:<br>' + JSON.stringify(data, null, 2);

            console.log('Sending data:', data);

            try {
                const response = await fetch(`${API_URL}/api/Auth/register/patient`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                console.log('Response status:', response.status);
                debugDiv.innerHTML += '<br><br>📥 Статус ответа: ' + response.status;

                // Получаем ответ как текст (для отладки)
                const responseText = await response.text();
                debugDiv.innerHTML += '<br><br>📄 Тело ответа:<br>' + responseText;

                if (response.ok) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = '✅ Регистрация успешна! Перенаправление...';

                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else if (response.status === 400) {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = '❌ Ошибка 400: Неправильные данные. Проверьте формат даты и полей.';
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = '❌ Ошибка ' + response.status + ': ' + responseText;
                }
            } catch (error) {
                console.error('Network error:', error);
                debugDiv.innerHTML += '<br><br>⚠️ Ошибка сети: ' + error.message;
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ Ошибка подключения к серверу. Убедитесь, что API запущен.';
            }
        });
    </script>
</body>
</html>
