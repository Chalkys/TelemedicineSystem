<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Телемедицина</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            padding: 30px;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

            button:hover {
                transform: translateY(-2px);
            }

        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }

        .error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }

        .success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }

        .link {
            text-align: center;
            margin-top: 15px;
        }

            .link a {
                color: #667eea;
                text-decoration: none;
            }

        .role-info {
            margin-top: 20px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 5px;
            font-size: 12px;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Вход в систему</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required placeholder="patient@example.com">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="password" required placeholder="••••••">
            </div>
            <button type="submit">Войти</button>
            <div style="text-align: right; margin-top: 5px;">
                <a href="forgot-password.html" style="font-size: 12px; color: #667eea; text-decoration: none;">Забыли пароль?</a>
            </div>
        </form>
        <div id="message" class="message" style="display: none;"></div>
        <div class="link">
            <a href="register.html">Нет аккаунта? Зарегистрироваться</a>
        </div>
    </div>

    <script>
        const API_URL = ``;

        // Очищаем старые данные при загрузке страницы входа
        localStorage.clear();
        console.log('LocalStorage очищен при загрузке страницы входа');

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const data = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            const messageDiv = document.getElementById('message');
            messageDiv.style.display = 'block';
            messageDiv.className = 'message';
            messageDiv.textContent = 'Отправка запроса...';

            try {
                console.log('Sending login request for:', data.email);

                const response = await fetch(`${API_URL}/api/Auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                console.log('Response status:', response.status);
                const result = await response.json();
                console.log('Response data:', result);

                if (response.ok) {
                    // Сохраняем токен и данные пользователя
                    localStorage.setItem('token', result.token);
                    localStorage.setItem('role', result.role);
                    localStorage.setItem('userId', result.userId);

                    console.log('Token saved:', result.token.substring(0, 50) + '...');
                    console.log('Role saved:', result.role);

                    messageDiv.className = 'message success';
                    messageDiv.textContent = 'Вход выполнен! Перенаправление...';

                    setTimeout(() => {
                        console.log('Redirecting based on role:', result.role);

                        switch (result.role) {
                            case 'Patient':
                                window.location.href = '/dashboard.html';
                                break;
                            case 'Consultant':
                                window.location.href = '/consultant_dashboard.html';
                                break;
                            case 'Operator':
                                window.location.href = '/operator_dashboard.html';
                                break;
                            default:
                                window.location.href = '/dashboard.html';
                        }
                    }, 1000);
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = result.message || 'Неверный email или пароль';
                }
            } catch (error) {
                console.error('Login error:', error);
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Ошибка подключения к серверу. Убедитесь, что API запущен.';
            }
        });
    </script>
</body>
</html>
