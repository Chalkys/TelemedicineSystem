<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Новый пароль - Телемедицина</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            padding: 30px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input, button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
        }

        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }

        .success {
            background: #d4edda;
            color: #155724;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
        }

        .link {
            text-align: center;
            margin-top: 15px;
        }

        a {
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Установка нового пароля</h2>
        <input type="password" id="newPassword" placeholder="Новый пароль">
        <input type="password" id="confirmPassword" placeholder="Подтвердите пароль">
        <button id="resetBtn">Сохранить пароль</button>
        <div id="message"></div>
        <div class="link"><a href="login.html">Вернуться ко входу</a></div>
    </div>
    <script>
        const API_URL = `http://127.0.0.1:5096`;

        // Получаем параметры из URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const email = urlParams.get('email');

        if (!token || !email) {
            document.getElementById('message').innerHTML = '<div class="error">Недействительная ссылка сброса пароля</div>';
            document.getElementById('resetBtn').disabled = true;
        }

        document.getElementById('resetBtn').onclick = async () => {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const msgDiv = document.getElementById('message');

            if (!newPassword || !confirmPassword) {
                msgDiv.innerHTML = '<div class="error">Заполните оба поля</div>';
                return;
            }

            if (newPassword !== confirmPassword) {
                msgDiv.innerHTML = '<div class="error">Пароли не совпадают</div>';
                return;
            }

            if (newPassword.length < 6) {
                msgDiv.innerHTML = '<div class="error">Пароль должен содержать минимум 6 символов</div>';
                return;
            }

            msgDiv.innerHTML = '<div>Отправка...</div>';

            try {
                const response = await fetch(`${API_URL}/api/Auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, token, newPassword })
                });

                const result = await response.json();

                if (response.ok) {
                    msgDiv.innerHTML = `<div class="success">${result.message}</div>`;
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                } else {
                    msgDiv.innerHTML = `<div class="error">${result.message}</div>`;
                }
            } catch (error) {
                msgDiv.innerHTML = '<div class="error">Ошибка подключения к серверу</div>';
            }
        };
    </script>
</body>
</html>
