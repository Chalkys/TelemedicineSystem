<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Консультация - Телемедицина</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f7fa;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .info-panel {
            width: 300px;
            background: white;
            padding: 20px;
            border-right: 1px solid #e0e0e0;
            overflow-y: auto;
            flex-shrink: 0;
        }

            .info-panel h3 {
                color: #333;
                margin-bottom: 10px;
            }

            .info-panel h4 {
                color: #555;
                margin: 15px 0 8px;
            }

            .info-panel p {
                margin-bottom: 8px;
                color: #555;
                font-size: 14px;
            }

        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .video-container {
            display: none;
            padding: 10px;
            background: #1a1a2e;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            min-height: 200px;
        }

            .video-container.active {
                display: flex;
            }

        .video-wrapper {
            position: relative;
            width: 320px;
            max-width: 48%;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
        }

            .video-wrapper video {
                width: 100%;
                height: auto;
                display: block;
            }

            .video-wrapper .label {
                position: absolute;
                bottom: 8px;
                left: 8px;
                background: rgba(0,0,0,0.6);
                color: white;
                padding: 4px 10px;
                border-radius: 5px;
                font-size: 12px;
            }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            min-height: 200px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.4;
        }

            .message.mine {
                align-self: flex-end;
                background: #dcf8c6;
                border-bottom-right-radius: 5px;
            }

            .message.other {
                align-self: flex-start;
                background: #f0f0f0;
                border-bottom-left-radius: 5px;
            }

            .message .time {
                font-size: 11px;
                color: #999;
                margin-top: 4px;
            }

        .input-area {
            display: flex;
            padding: 15px;
            border-top: 1px solid #e0e0e0;
            gap: 10px;
        }

            .input-area input {
                flex: 1;
                padding: 10px 15px;
                border: 1px solid #ddd;
                border-radius: 20px;
                outline: none;
            }

        .btn {
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            color: white;
            font-size: 14px;
        }

        .btn-send {
            background: #11998e;
        }

        .btn-call {
            background: #28a745;
        }

        .btn-hangup {
            background: #dc3545;
            display: none;
        }

        .btn-end {
            background: #dc3545;
        }

        .btn-back {
            background: #667eea;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
            background: #17a2b8;
            border-radius: 15px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-scheduled {
            background: #fff3cd;
            color: #856404;
        }

        .status-in_progress {
            background: #d4edda;
            color: #155724;
        }

        .status-completed {
            background: #e2e3e5;
            color: #383d41;
        }

        .doc-item {
            margin-bottom: 4px;
            font-size: 13px;
        }

            .doc-item a {
                color: #11998e;
                text-decoration: none;
            }

                .doc-item a:hover {
                    text-decoration: underline;
                }
    </style>
</head>
<body>
    <header>
        <div><span id="headerInfo">Консультация</span></div>
        <div>
            <span id="statusBadge" class="status-badge status-scheduled">Запланирована</span>
            <button id="btnCall" class="btn btn-call" style="display:none;" onclick="startCall()">📞 Позвонить</button>
            <button id="btnHangup" class="btn btn-hangup" onclick="hangUp()">📴 Завершить звонок</button>
            <button id="btnEnd" class="btn btn-end" style="display:none;" onclick="endConsultation()">Завершить консультацию</button>
            <button class="btn btn-back" onclick="goBack()">← Назад</button>
        </div>
    </header>
    <div class="container">
        <div class="info-panel" id="infoPanel"></div>
        <div class="main-area">
            <div class="video-container" id="videoContainer">
                <div class="video-wrapper">
                    <video id="localVideo" autoplay muted playsinline></video>
                    <div class="label">Вы</div>
                </div>
                <div class="video-wrapper">
                    <video id="remoteVideo" autoplay playsinline></video>
                    <div class="label" id="remoteLabel">Собеседник</div>
                </div>
            </div>
            <div class="chat-area">
                <div class="messages" id="messages"></div>
                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="Введите сообщение...">
                    <button class="btn btn-send" id="btnSend">Отправить</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://192.168.0.106:5095';
        const token = localStorage.getItem('token');
        const role = localStorage.getItem('role');
        const consultationId = new URLSearchParams(window.location.search).get('id');

        let connection;
        let currentUserId;
        let currentUserName = '';
        let localStream;
        let peerConnection;
        const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        function getRoleName(r) {
            const roles = { 'Patient': 'Пациент', 'Consultant': 'Консультант', 'Operator': 'Оператор' };
            return roles[r] || r;
        }

        async function init() {
            if (!consultationId) { alert('Консультация не найдена'); return; }

            try {
                const r = await fetch(`${API_URL}/api/Consultation/my`, { headers: { 'Authorization': `Bearer ${token}` } });
                const consultations = await r.json();
                const cons = consultations.find(c => c.consultationId === consultationId);
                if (!cons) { alert('Консультация не найдена'); return; }

                const me = await fetch(`${API_URL}/api/Users/me`, { headers: { 'Authorization': `Bearer ${token}` } });
                const user = await me.json();
                currentUserId = user.userId;

                if (role === 'Patient') {
                    currentUserName = (user.surname || '') + ' ' + (user.name || '');
                    if (!currentUserName.trim()) currentUserName = user.email;
                } else {
                    currentUserName = cons.consultantFullName;
                }

                document.getElementById('headerInfo').textContent = `👤 ${currentUserName.trim()} (${getRoleName(role)})`;

                const otherName = role === 'Patient' ? cons.consultantFullName : cons.patientFullName;
                const otherRole = role === 'Patient' ? 'Консультант' : 'Пациент';
                document.getElementById('remoteLabel').textContent = otherName;

                document.getElementById('infoPanel').innerHTML = `
                        <h3>${otherRole}:</h3>
                        <p><strong>${otherName}</strong></p>
                        ${role === 'Patient' ? `<p>${cons.consultantSpecialty}</p>` : ''}
                        <p>📅 ${new Date(cons.date).toLocaleString()}</p>
                        <p>📋 ${cons.subject}</p>
                        <h4>📎 Документы</h4>
                        <div id="docList"><p style="color:#999;font-size:12px;">Загрузка...</p></div>
                        <input type="file" id="fileInput" accept=".pdf" style="display:none;" onchange="uploadDocument()">
                        <button class="btn btn-sm" onclick="document.getElementById('fileInput').click()" style="margin-top:8px;">+ Загрузить PDF</button>
                    `;

                updateStatusUI(cons.status);

                const msgs = await fetch(`${API_URL}/api/Consultation/${consultationId}/messages`, { headers: { 'Authorization': `Bearer ${token}` } });
                const messages = await msgs.json();
                messages.forEach(m => addMessage(m, m.senderId === currentUserId));

                await connectSignalR();
                loadDocuments();
            } catch (e) {
                console.error(e);
                document.getElementById('messages').innerHTML = '<p style="color:red;">Ошибка загрузки</p>';
            }

            document.getElementById('btnSend').addEventListener('click', sendMessage);
            document.getElementById('messageInput').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') sendMessage();
            });
        }

        function updateStatusUI(status) {
            const badge = document.getElementById('statusBadge');
            badge.textContent = status === 'scheduled' ? 'Запланирована' : status === 'in_progress' ? 'Идёт' : 'Завершена';
            badge.className = 'status-badge status-' + status;
            if (role === 'Consultant' && status === 'scheduled') {
                document.getElementById('btnCall').style.display = 'inline-block';
            }
            if (status === 'in_progress' && role === 'Consultant') {
                document.getElementById('btnEnd').style.display = 'inline-block';
            }
        }

        async function connectSignalR() {
            connection = new signalR.HubConnectionBuilder()
                .withUrl(`${API_URL}/hubs/consultation`, { accessTokenFactory: () => token })
                .withAutomaticReconnect()
                .configureLogging(signalR.LogLevel.Information)
                .build();

            connection.on("ReceiveMessage", (msg) => {
                addMessage(msg, msg.senderId === currentUserId);
            });

            connection.on("ReceiveOffer", async (offer) => {
                console.log("📞 Incoming call");
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                    document.getElementById('localVideo').srcObject = localStream;
                    document.getElementById('videoContainer').classList.add('active');
                } catch (e) { console.log("Камера недоступна"); }
                await setupPeerConnection();
                await peerConnection.setRemoteDescription(new RTCSessionDescription(JSON.parse(offer)));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                await connection.invoke("SendAnswer", consultationId, JSON.stringify(answer));
                document.getElementById('btnHangup').style.display = 'inline-block';
            });

            connection.on("ReceiveAnswer", async (answer) => {
                if (peerConnection) {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(JSON.parse(answer)));
                }
            });

            connection.on("ReceiveIceCandidate", async (candidate) => {
                if (candidate && peerConnection) {
                    try { await peerConnection.addIceCandidate(new RTCIceCandidate(JSON.parse(candidate))); } catch (e) { }
                }
            });

            connection.onreconnecting(() => console.log("Reconnecting..."));
            connection.onreconnected(() => console.log("Reconnected!"));
            connection.onclose(() => console.log("Connection closed"));

            try {
                await connection.start();
                console.log("✅ SignalR connected!");
                await connection.invoke("JoinConsultation", consultationId);
            } catch (err) { console.error("SignalR error:", err.message); }
        }

        async function setupPeerConnection() {
            peerConnection = new RTCPeerConnection(rtcConfig);
            if (localStream) {
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            }
            peerConnection.ontrack = (event) => {
                document.getElementById('remoteVideo').srcObject = event.streams[0];
            };
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    connection.invoke("SendIceCandidate", consultationId, JSON.stringify(event.candidate));
                }
            };
            peerConnection.onconnectionstatechange = () => {
                if (peerConnection.connectionState === 'connected') console.log("✅ WebRTC connected");
            };
        }

        async function startCall() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = localStream;
                document.getElementById('videoContainer').classList.add('active');
                await fetch(`${API_URL}/api/Consultation/${consultationId}/start`, {
                    method: 'POST', headers: { 'Authorization': `Bearer ${token}` }
                });
                updateStatusUI('in_progress');
                await setupPeerConnection();
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                await connection.invoke("SendOffer", consultationId, JSON.stringify(offer));
                document.getElementById('btnCall').style.display = 'none';
                document.getElementById('btnHangup').style.display = 'inline-block';
            } catch (e) { console.error(e); alert('Ошибка доступа к камере/микрофону.'); }
        }

        async function hangUp() {
            if (peerConnection) { peerConnection.close(); peerConnection = null; }
            if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
            document.getElementById('localVideo').srcObject = null;
            document.getElementById('remoteVideo').srcObject = null;
            document.getElementById('videoContainer').classList.remove('active');
            document.getElementById('btnHangup').style.display = 'none';
        }

        function addMessage(msg, isMine) {
            const div = document.createElement('div');
            div.className = 'message ' + (isMine ? 'mine' : 'other');
            div.innerHTML = `${msg.text}<div class="time">${new Date(msg.sentAt).toLocaleTimeString()}</div>`;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !connection) return;
            try {
                await connection.invoke("SendMessage", consultationId, text);
                input.value = '';
            } catch (err) { console.error(err); }
        }

        async function endConsultation() {
            if (!confirm('Завершить консультацию?')) return;
            hangUp();
            try {
                await fetch(`${API_URL}/api/Consultation/${consultationId}/complete`, {
                    method: 'POST', headers: { 'Authorization': `Bearer ${token}` }
                });
                updateStatusUI('completed');
                document.getElementById('btnEnd').style.display = 'none';
                if (role === 'Consultant') {
                    window.location.href = 'consultant_dashboard.html';
                }
            } catch (e) { console.error(e); }
        }

        function goBack() {
            hangUp();
            if (role === 'Patient') window.location.href = 'dashboard.html';
            else window.location.href = 'consultant_dashboard.html';
        }

        // ===== ДОКУМЕНТЫ =====
        async function loadDocuments() {
            try {
                const r = await fetch(`${API_URL}/api/Consultation/${consultationId}/documents`, { headers: { 'Authorization': `Bearer ${token}` } });
                if (r.ok) {
                    const docs = await r.json();
                    let html = '';
                    if (docs.length === 0) {
                        html = '<p style="color:#999;font-size:12px;">Нет документов</p>';
                    } else {
                        docs.forEach(d => {
                            html += `<div class="doc-item">
                                    <a href="#" onclick="downloadDoc('${d.documentId}','${d.fileName}');return false;">📄 ${d.fileName}</a>
                                    <span style="color:#999;font-size:10px;"> ${new Date(d.uploadDate).toLocaleDateString()}</span>
                                </div>`;
                        });
                    }
                    document.getElementById('docList').innerHTML = html;
                }
            } catch (e) { console.error(e); }
        }

        async function uploadDocument() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append('file', file);
            try {
                const r = await fetch(`${API_URL}/api/Consultation/${consultationId}/upload`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                if (r.ok) {
                    document.getElementById('fileInput').value = '';
                    loadDocuments();
                } else { alert('Ошибка загрузки'); }
            } catch (e) { console.error(e); }
        }

        function downloadDoc(docId, fileName) {
            fetch(`${API_URL}/api/Documents/${docId}/download`, {
                headers: { 'Authorization': `Bearer ${token}` }
            })
                .then(response => response.blob())
                .then(blob => {
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = fileName;
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    window.URL.revokeObjectURL(url);
                })
                .catch(e => console.error('Download error:', e));
        }

        init();
    </script>
</body>
</html>
